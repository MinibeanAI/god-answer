<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上帝的回应— 以圣经中上帝的口吻回应你的一切问题</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #f5f0fa;
  --bg-card: #ffffff;
  --bg-hover: #ede5f5;
  --border: #e0d4ee;
  --text-primary: #3d2e4d;
  --text-secondary: #7a6b8a;
  --text-muted: #a99bc2;
  --gold: #9b72cf;
  --gold-border: rgba(155, 114, 207, 0.35);
  --purple-deep: #6b4fa0;
  --purple-light: #e8dff5;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Serif SC', serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  background-image: radial-gradient(ellipse at top, #f0e8fa 0%, var(--bg-dark) 70%);
}
.header {
  text-align: center;
  padding: 60px 40px 50px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #f8f2ff 0%, var(--bg-dark) 100%);
}
.header-eyebrow {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 20px;
}
.header-title {
  font-family: 'Cinzel', serif;
  font-size: 48px;
  font-weight: 600;
  color: var(--purple-deep);
  letter-spacing: 8px;
  margin-bottom: 16px;
}
.header-subtitle {
  font-size: 15px;
  color: var(--text-secondary);
  font-weight: 300;
  max-width: 460px;
  margin: 0 auto;
  line-height: 1.8;
}
.header-verse {
  margin-top: 24px;
  font-size: 12px;
  color: var(--text-muted);
  font-style: italic;
  opacity: 0.8;
}
.main {
  max-width: 860px;
  margin: 0 auto;
  padding: 50px 40px 80px;
}
.section-label {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.chat-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 16px rgba(100, 80, 160, 0.06);
  margin-bottom: 30px;
}
.chat-messages {
  height: 380px;
  overflow-y: auto;
  padding: 0;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.chat-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 40px;
  text-align: center;
}
.chat-empty-icon { font-size: 42px; margin-bottom: 16px; opacity: 0.3; }
.chat-empty-text { font-size: 14px; color: var(--text-muted); line-height: 1.8; }
.msg { padding: 18px 24px; border-bottom: 1px solid var(--border); animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { background: var(--purple-light); }
.msg.god { background: #faf7fd; }
.msg-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
.msg-content { font-size: 15px; line-height: 1.9; color: var(--text-primary); }
.msg-content p { margin-bottom: 10px; }
.msg-content p:last-child { margin-bottom: 0; }
.msg-ref { margin-top: 14px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); font-style: italic; }
.chat-input-area { padding: 14px 18px; border-top: 1px solid var(--border); background: var(--bg-card); }
.input-row { display: flex; gap: 10px; }
.chat-input {
  flex: 1;
  background: var(--bg-dark);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  font-family: 'Noto Serif SC', serif;
  font-size: 14px;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.2s;
}
.chat-input::placeholder { color: var(--text-muted); }
.chat-input:focus { border-color: var(--gold-border); }
.send-btn {
  background: var(--gold);
  color: #fff;
  border: none;
  padding: 12px 20px;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(155, 114, 207, 0.3);
}
.send-btn:hover { background: var(--purple-deep); box-shadow: 0 4px 12px rgba(155, 114, 207, 0.4); }
.send-btn:disabled { background: var(--text-muted); cursor: not-allowed; }
.clear-btn {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
  padding: 12px 14px;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 2px;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.2s;
}
.clear-btn:hover { color: var(--text-secondary); border-color: var(--gold-border); }
.example-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.example-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1.5;
}
.example-card:hover { background: var(--bg-hover); border-color: var(--gold-border); color: var(--text-primary); box-shadow: 0 2px 12px rgba(155, 114, 207, 0.1); }
.example-card-icon { font-size: 16px; margin-bottom: 6px; opacity: 0.7; }
.footer { text-align: center; padding: 30px; border-top: 1px solid var(--border); }
.footer-text { font-size: 12px; color: var(--text-muted); font-style: italic; }
.footer-disclaimer { margin-top: 10px; font-size: 11px; color: var(--text-muted); opacity: 0.6; }
@media (max-width: 768px) {
  .header { padding: 40px 20px 30px; }
  .header-title { font-size: 32px; letter-spacing: 4px; }
  .main { padding: 30px 20px 50px; }
  .example-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<header class="header">
  <div class="header-eyebrow">Skill Profile</div>
  <h1 class="header-title">上帝的回应</h1>
  <p class="header-subtitle">以圣经中上帝的口吻，陪你看清问题、给你行动指引。慈爱而直接，温柔但不绕弯。每句话都有经文根据。</p>
  <p class="header-verse">"我是耶和华你的上帝。" —— 出埃及记 20:2</p>
</header>
<main class="main">
  <div class="section-label">开始对话</div>
  <div class="chat-box">
    <div class="chat-messages" id="chatMessages">
      <div class="chat-empty">
        <div class="chat-empty-icon">✦</div>
        <div class="chat-empty-text">问上帝一个问题<br><small style="opacity: 0.6;">慈爱、直接、有经文根据</small></div>
      </div>
    </div>
    <div class="chat-input-area">
      <div class="input-row">
        <input type="text" class="chat-input" id="userInput" placeholder="问上帝一个问题..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
        <button class="clear-btn" onclick="clearChat()">清空</button>
      </div>
    </div>
  </div>
  <div class="example-grid">
    <div class="example-card" onclick="askQuestion('我很害怕失败')"><div class="example-card-icon">😰</div>我很害怕失败</div>
    <div class="example-card" onclick="askQuestion('我该不该跳槽？')"><div class="example-card-icon">💼</div>我该不该跳槽？</div>
    <div class="example-card" onclick="askQuestion('为什么好人没有好报？')"><div class="example-card-icon">❓</div>为什么好人没有好报？</div>
    <div class="example-card" onclick="askQuestion('和朋友决裂了怎么办？')"><div class="example-card-icon">💔</div>和朋友决裂了怎么办</div>
    <div class="example-card" onclick="askQuestion('我和父母关系很僵')"><div class="example-card-icon">👨‍👩‍👧</div>我和父母关系很僵</div>
    <div class="example-card" onclick="askQuestion('我该怎么原谅伤害过我的人？')"><div class="example-card-icon">🙏</div>该怎么原谅伤害我的人</div>
  </div>
</main>
<footer class="footer">
  <p class="footer-text">"你们中间若有缺少智慧的，应当求上帝。" —— 雅各书 1:5</p>
  <p class="footer-disclaimer">以上为基于圣经经文的灵修参考，非专业心理咨询或神学指导</p>
</footer>
<script>
const API_BASE = window.location.origin;
const conversationHistory = [];

async function sendMessage() {
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text) return;

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  input.value = '';
  sendBtn.disabled = true;

  try {
    const response = await fetch(API_BASE + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await response.json();
    if (data.error) {
      addMessage('god', ['错误: ' + data.error]);
    } else {
      const paragraphs = data.reply.split('\n').filter(p => p.trim());
      addMessage('god', paragraphs);
      conversationHistory.push({ role: 'god', content: paragraphs });
    }
  } catch (error) {
    addMessage('god', ['网络错误，请稍后重试。']);
  }
  sendBtn.disabled = false;
}

function addMessage(role, content) {
  const container = document.getElementById('chatMessages');
  const empty = container.querySelector('.chat-empty');
  if (empty) empty.remove();
  
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg ' + role;
  const contentHtml = Array.isArray(content) ? content.map(line => '<p>' + line + '</p>').join('') : '<p>' + content + '</p>';
  
  if (role === 'god') {
    msgDiv.innerHTML = '<div class="msg-label">上帝</div><div class="msg-content">' + contentHtml + '</div><div class="msg-ref">⸻ 以上基于圣经经文的灵修参考</div>';
  } else {
    msgDiv.innerHTML = '<div class="msg-label">你</div><div class="msg-content"><p>' + content + '</p></div>';
  }
  container.appendChild(msgDiv);
  container.scrollTop = container.scrollHeight;
}

function askQuestion(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function clearChat() {
  const container = document.getElementById('chatMessages');
  container.innerHTML = '<div class="chat-empty"><div class="chat-empty-icon">✦</div><div class="chat-empty-text">问上帝一个问题<br><small style="opacity: 0.6;">慈爱、直接、有经文根据</small></div></div>';
  conversationHistory.length = 0;
}
</script>
</body>
</html>
